<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    h2 {
      margin-bottom: 15px;
    }

    .muted {
      color: gray;
      font-size: 12px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h2>🔔 Notifications</h2>

<div id="list">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getFirestore,
  collection,
  query,
  where,
  onSnapshot,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCcHlQTDGsF5lBNNzrOtpRkiaBhrjkIE4M",
  authDomain: "youth-connect-rwanda.firebaseapp.com",
  projectId: "youth-connect-rwanda"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const q = query(
    collection(db, "notifications"),
    where("to", "==", user.uid),
    orderBy("time", "desc")
  );

  onSnapshot(q, (snap) => {
    const box = document.getElementById("list");
    box.innerHTML = "";

    if (snap.empty) {
      box.innerHTML = `<div class="card">No notifications yet</div>`;
      return;
    }

    snap.forEach(doc => {
      const n = doc.data();

      box.innerHTML += `
        <div class="card">
          <b>${n.text}</b>
          <div class="muted">${n.type || "activity"}</div>
        </div>
      `;
    });
  });
});

</script>

</body>
</html>
