<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Chat</title>

  <style>
    body { margin:0; font-family:Arial; background:#f0f2f5; }

    .users {
      padding:10px;
      background:white;
    }

    .user {
      padding:10px;
      margin:5px 0;
      background:#eee;
      border-radius:8px;
      cursor:pointer;
    }

    .chat {
      height:60vh;
      overflow-y:auto;
      padding:10px;
    }

    .msg {
      background:white;
      padding:8px;
      margin:5px 0;
      border-radius:8px;
    }

    .typing {
      font-size:12px;
      color:gray;
      padding:5px;
    }

    .inputBox {
      display:flex;
      padding:10px;
      background:white;
    }

    input {
      flex:1;
      padding:10px;
    }

    button {
      margin-left:5px;
      background:#1877f2;
      color:white;
      border:none;
      padding:10px;
    }
  </style>
</head>

<body>

<div class="users" id="users"></div>

<div class="chat" id="chat"></div>

<div class="typing" id="typing"></div>

<div class="inputBox">
  <input id="msg">
  <button onclick="send()">Send</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  onSnapshot,
  orderBy,
  serverTimestamp,
  getDocs,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyCcHlQTDGsF5lBNNzrOtpRkiaBhrjkIE4M",
  authDomain: "youth-connect-rwanda.firebaseapp.com",
  projectId: "youth-connect-rwanda"
});

const db = getFirestore(app);
const auth = getAuth(app);

let myId = "";
let myName = "";
let chatId = "";

onAuthStateChanged(auth, async (user) => {
  if (!user) return (window.location.href = "index.html");

  myId = user.uid;
  myName = user.email.split("@")[0];

  loadUsers();
});

/* USERS */
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));

  const box = document.getElementById("users");
  box.innerHTML = "";

  snap.forEach(u => {
    if (u.id === myId) return;

    box.innerHTML += `
      <div class="user" onclick="openChat('${u.id}')">
        ${u.data().name || "User"}
      </div>
    `;
  });
}

/* OPEN CHAT */
window.openChat = function(otherId) {
  const ids = [myId, otherId].sort();
  chatId = ids.join("_");

  listen();
};

/* LISTEN */
function listen() {
  const q = query(
    collection(db, "chats", chatId, "messages"),
    orderBy("time")
  );

  onSnapshot(q, (snap) => {
    const box = document.getElementById("chat");
    box.innerHTML = "";

    snap.forEach(m => {
      box.innerHTML += `
        <div class="msg">${m.data().name}: ${m.data().text}</div>
      `;
    });

    box.scrollTop = box.scrollHeight;
  });

  /* typing */
  onSnapshot(doc(db, "chats", chatId), (docSnap) => {
    const data = docSnap.data();
    document.getElementById("typing").innerText =
      data?.typing && data.typing !== myName
        ? data.typing + " is typing..."
        : "";
  });
}

/* SEND */
window.send = async function () {
  const text = document.getElementById("msg").value;
  if (!text || !chatId) return;

  await addDoc(collection(db, "chats", chatId, "messages"), {
    text,
    name: myName,
    from: myId,
    time: serverTimestamp()
  });

  document.getElementById("msg").value = "";
};

/* TYPING */
document.addEventListener("input", async (e) => {
  if (!chatId) return;

  await setDoc(doc(db, "chats", chatId), {
    typing: myName
  }, { merge: true });

  setTimeout(async () => {
    await setDoc(doc(db, "chats", chatId), {
      typing: ""
    }, { merge: true });
  }, 1500);
});

</script>

</body>
</html>
